services:
  nginx:
    image: nginx:alpine
    container_name: snail-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    container_name: snail-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  db:
    image: postgres:16-alpine
    container_name: snail-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: snail_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: snail_app_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snail_app -d snail_app_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: snail-app:latest
    container_name: snail-web
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_HOST: db
      DATABASE_USERNAME: snail_app
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SNAIL_APP_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SOLID_QUEUE_IN_PUMA: "true"
      RAILS_LOG_TO_STDOUT: "true"
      PORT: "80"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"

volumes:
  postgres_data:
